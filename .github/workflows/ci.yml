name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  supported-platforms:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Unit and runtime contracts
        run: python -W error::ResourceWarning -m unittest discover -s tests -p "test_*.py" -v
      - name: One-consent quickstart contract
        run: python -W error::ResourceWarning -m unittest tests.test_quickstart -v
      - name: Release byte manifest
        run: python scripts/generate-package-manifest.py --check --source git

  windows-fail-closed:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Installer and package contracts remain fail-closed
        run: >-
          python -m unittest
          tests.test_package_contract
          tests.test_bootstrap.BootstrapTests.test_windows_is_blocked_even_if_codex_plugin_cli_exists
          -v
